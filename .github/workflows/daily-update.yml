name: Daily Auto Commit

on:
  schedule:
    - cron: '30 9 * * *'  # Runs daily at 9:30 AM UTC
  workflow_dispatch:      # Allows manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: 24f2000903@ds.study.iitm.ac.in - Make Daily Update
        run: |
          echo "Last updated on $(date)" >> daily-log.txt
          
      - name: Commit Changes
        run: |
          git config --global user.name "DevSync Bot"
          git config --global user.email "24f2000903@ds.study.iitm.ac.in"
          git add daily-log.txt
          git commit -m "Daily automated update"
          git push
